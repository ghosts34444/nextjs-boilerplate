<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="../../assets/ghost/лого1.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - DarkGalaxy</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(#0f0f1b);
      background-attachment: fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #e0e0ff;
      font-family: 'Exo 2', sans-serif;
      text-align: center;
      overflow: hidden;
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 600px;
      padding: 30px;
    }

    .error-code {
      font-size: 6rem;
      font-weight: bold;
      color: #f3ddff;
      margin: 0 0 10px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .error-message {
      font-size: 1.4rem;
      margin: 0 0 20px;
    }

    .query {
      color: #ebd2ff;
      font-weight: bold;
      word-break: break-all;
    }

    .back-btn {
      display: block;
      width: 240px;
      margin: 0 auto 30px;
      padding: 12px;
      background: rgba(30, 30, 50, 0.9);
      border: 2px solid rgba(80, 80, 120, 0.3);
      color: #e0e0ff;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
    }

    .back-btn:hover {
      background: rgba(50, 50, 80, 0.95);
      box-shadow: 0px 0 10px rgba(195, 187, 243, 0.4);
    }

    .star {
      position: absolute;
      color: white;
      font-size: 1.1em;
      opacity: 0;
    }

    .ambient-light {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('../../assets/ghost/background_glow.CMg_rSSe.webp') no-repeat center center;
      background-size: cover;
      pointer-events: none;
      z-index: 999;
      opacity: 1;
    }

    .background-png {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: no-repeat center center;
      background-size: cover;
      pointer-events: none;
      z-index: 999;
    }

    .background-png {
      opacity: 0.1;
      transition: opacity 2.2s ease;
    }

    .background-png.loaded {
      opacity: 0.2;
    }
  </style>
</head>

<body>

  <div id="stars-container"></div>
  <div class="ambient-light"></div>
  <div class="background-png"></div>

  <div class="content">
    <div class="error-code">404</div>
    <div class="error-message">Страница не найдена</div>
    <div class="error-message">
      Не удалось найти: <span class="query" id="search-query"></span>
    </div>
    <a href="#" class="back-btn" id="back-button">Вернуться</a>
  </div>
  <script src="../../styles/stars/stars.js"></script>
  <script>
    const url = new URL(window.location.href);
    const path = url.pathname + url.search;
    document.getElementById('search-query').textContent = path;

    const backButton = document.getElementById('back-button');
    backButton.addEventListener('click', (e) => {
      e.preventDefault();
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/saut/index.html';
      }
    });

    const backgroundImages = [
      '../../assets/image/2151134280.webp',
      '../../assets/image/019b812c-6070-7b28-a32f-f9253f64c081.webp',
      '../../assets/image/galaxy-wallpaper_1134901-199219.jpg',
      '../../assets/image/main.YO-gktiu.webp',
      '../../assets/image/maxresdefault.jpg'
    ];

const loadedImages = [];
function preloadBackgrounds() {
    return Promise.all(backgroundImages.map(src => {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.src = src;
            img.onload = () => {
                loadedImages.push(img);
                resolve(img);
            };
            img.onerror = () => {
                resolve(null); 
            };
        });
    }));
}

function applyRandomBackground() {
    const background-png = document.querySelector('.background-png');
    if (background-png && loadedImages.length > 0) {
        const randomIndex = Math.floor(Math.random() * loadedImages.length);
        const randomImage = loadedImages[randomIndex];
        background-png.style.backgroundImage = `url('${randomImage.src}')`;
        background-png.classList.add('loaded');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const ambientLight = document.querySelector('.ambient-light');  
    if (background-png) {
        background-png.style.background = 'rgba(30, 30, 50, 0.3)';я
        preloadBackgrounds().then(() => {
            applyRandomBackground();
        });
    }
});
  </script>
</body>

</html>
