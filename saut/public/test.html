<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkGalaxy — Главная</title>
    <style>
/* ========================================
🎨 ТЕМЫ (5 штук)
======================================== */
:root {
    --accent-primary: #d63384;
    --accent-secondary: #ff9f1c;
    --accent-glow: rgba(214, 51, 132, 0.5);
    --bg-deep: #0a0514;
    --bg-surface: rgba(20, 10, 30, 0.65);
    --text-main: #f0e6ff;
    --text-muted: #b8a9d4;
    --border-glass: rgba(255, 255, 255, 0.08);
}

.theme-royal-blue {
    --accent-primary: #3b82f6;
    --accent-secondary: #60a5fa;
    --accent-glow: rgba(59, 130, 246, 0.5);
    --bg-surface: rgba(15, 23, 42, 0.65);
}

.theme-deep-purple {
    --accent-primary: #8b5cf6;
    --accent-secondary: #3b82f6;
    --accent-glow: rgba(139, 92, 246, 0.5);
    --bg-surface: rgba(15, 10, 30, 0.65);
}

.theme-ghost {
    --accent-primary: #e0f7fa;
    --accent-secondary: #80deea;
    --accent-glow: rgba(224, 247, 250, 0.3);
    --bg-surface: rgba(15, 20, 25, 0.65);
    --text-muted: #8faab5;
}

.theme-neutral {
    --accent-primary: #9ca3af;
    --accent-secondary: #d1d5db;
    --accent-glow: rgba(156, 163, 175, 0.4);
    --bg-surface: rgba(31, 41, 55, 0.65);
    --text-muted: #9ca3af;
}

.theme-black-amber {
    --accent-primary: #ff5722;
    --accent-secondary: #ff9800;
    --accent-glow: rgba(255, 87, 34, 0.3);
    --bg-surface: rgba(10, 10, 10, 0.8);
    --border-glass: rgba(255, 87, 34, 0.2);
}

/* ========================================
🧱 БАЗА (Фон НЕ меняется от темы)
======================================== */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0514; /* Всегда темный фон */
    background-image: 
        radial-gradient(ellipse at top, rgba(30, 20, 40, 0.4), transparent 60%),
        radial-gradient(ellipse at bottom, rgba(20, 10, 30, 0.3), transparent 60%);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
}

/* Свет сверху (следует за экраном, тусклый) */
.top-glow {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 400px;
    background: radial-gradient(ellipse at center, 
        rgba(255, 255, 255, 0.08) 0%, 
        rgba(255, 255, 255, 0.03) 40%, 
        transparent 70%);
    pointer-events: none;
    z-index: -2;
}

/* Волны фона */
.cosmic-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
}

.wave {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
    opacity: 0.05;
    animation: rotate 30s linear infinite;
}

.w2 { animation-delay: -15s; opacity: 0.03; }

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Звезды */
#stars {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
}

.star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 4px currentColor;
    animation: twinkle 3s infinite ease-in-out alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1.2); }
}

/* ========================================
🧭 НАВБАР (60px, fixed)
======================================== */
/* ========================================
🧭 НАВБАР (60px, fixed)
======================================== */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: rgba(10, 5, 20, 0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    z-index: 1000;
}

.logo {
    font-size: 1.4rem; /* УВЕЛИЧИЛ */
    font-weight: 800;
    text-decoration: none;
    color: var(--text-main);
}

.logo-gradient {
    background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 2rem;
}

.desktop-links {
    display: flex;
    gap: 2rem; /* УВЕЛИЧИЛ отступ */
    list-style: none;
}

.desktop-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 1rem; /* УВЕЛИЧИЛ */
    font-weight: 600; /* ЖИРНЕЕ */
    transition: color 0.2s;
}

.desktop-links a:hover {
    color: var(--accent-secondary);
}

/* Дропдаун тем (ПК) - КЛИК вместо ховера */
.theme-dropdown {
    position: relative;
}

.theme-dropdown.open .theme-list {
    display: flex;
}

.theme-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-glass); /* ОБВОДКА */
    color: var(--text-main);
    padding: 8px 16px; /* ЧУТЬ БОЛЬШЕ */
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem; /* УВЕЛИЧИЛ */
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
}

.theme-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--accent-primary);
}

.theme-list {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: rgba(15, 10, 25, 0.98);
    border: 1px solid var(--border-glass); /* ОБВОДКА */
    border-radius: 8px;
    padding: 6px;
    min-width: 180px;
    display: none;
    flex-direction: column;
    gap: 4px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    z-index: 101;
}

.theme-option {
    background: none;
    border: 1px solid rgba(255, 255, 255, 0.1); /* ОБВОДКА */
    color: var(--text-main);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
}

.theme-option:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--accent-primary);
}

.theme-option.active {
    background: rgba(214, 51, 132, 0.2);
    border-color: var(--accent-primary);
}

.theme-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.3);
}

/* Мобильная кнопка - z-index ВЫШЕ меню */
.mobile-toggle {
    display: none;
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--border-glass);
    border-radius: 6px;
    cursor: pointer;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    transition: all 0.3s;
    z-index: 1002; /* ВЫШЕ overlay (1001) */
}

.mobile-toggle span {
    display: block;
    width: 20px;
    height: 2px;
    background: var(--text-main);
    transition: all 0.3s;
}

.mobile-toggle.open {
    background: rgba(214, 51, 132, 0.3);
    border-color: var(--accent-primary);
}

.mobile-toggle.open span:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
}

.mobile-toggle.open span:nth-child(2) {
    opacity: 0;
}

.mobile-toggle.open span:nth-child(3) {
    transform: rotate(-45deg) translate(5px, -5px);
}

/* ========================================
📱 МОБИЛЬНОЕ МЕНЮ
======================================== */
.mobile-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 3, 10, 0.98);
    z-index: 1001; /* НИЖЕ кнопки (1002) */
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
}

.mobile-overlay.active {
    opacity: 1;
    visibility: visible;
}

/* ПК полоска внутри мобильного меню */
.mobile-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: rgba(10, 5, 20, 0.95);
    border-bottom: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    padding: 0 1.5rem;
    z-index: 10;
}

.mobile-logo {
    font-size: 1.2rem;
    font-weight: 800;
    text-decoration: none;
}

.mobile-nav-inner {
    padding: 100px 1.5rem 2rem; /* Отступ сверху для navbar */
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    overflow-y: auto;
    max-height: 100vh;
}

.mobile-link {
    color: var(--text-main);
    text-decoration: none;
    font-size: 1.2rem; /* УМЕНЬШИЛ с 1.5rem */
    font-weight: 600;
    padding: 1rem;
    border-radius: 8px;
    transition: all 0.2s;
}

.mobile-link:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--accent-secondary);
}

/* Мобильные темы */
.mobile-themes-section {
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border-glass);
}

.mobile-themes-title {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.mobile-theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
}

.mobile-theme-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-glass); /* ОБВОДКА */
    border-radius: 8px;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
}

.mobile-theme-card:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--accent-primary);
    transform: translateY(-2px);
}

.mobile-theme-card.active {
    background: rgba(214, 51, 132, 0.15);
    border-color: var(--accent-primary);
    box-shadow: 0 0 20px var(--accent-glow);
}

.mobile-theme-preview {
    width: 100%;
    height: 40px;
    border-radius: 6px;
    margin-bottom: 0.5rem;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.mobile-theme-name {
    font-size: 0.8rem;
    color: var(--text-muted);
}
/* ========================================
🔘 КНОПКИ
======================================== */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 28px;
    font-size: 0.95rem;
    font-weight: 600;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px var(--accent-glow);
    color: #fff;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--accent-glow);
    filter: brightness(1.1);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-glass);
    box-shadow: none;
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

/* ========================================
📦 КОНТЕНТ
======================================== */
.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 120px 2rem 4rem;
    text-align: center;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    background: linear-gradient(90deg, var(--text-main), var(--accent-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

p {
    color: var(--text-muted);
    font-size: 1.1rem;
    line-height: 1.6;
}

/* ========================================
📱 АДАПТИВ
======================================== */
@media (max-width: 768px) {
    .desktop-links,
    .theme-dropdown {
        display: none;
    }
    
    .mobile-toggle {
        display: flex;
    }
    
    .navbar {
        padding: 0 1.5rem;
    }
}
    </style>
</head>
<body>
    <!-- Навбар (генерируется JS) -->
    
    <!-- Фон -->
    <div class="top-glow"></div>
    <div class="cosmic-bg">
        <div class="wave w1"></div>
        <div class="wave w2"></div>
    </div>
    <div id="stars"></div>

    <!-- Контент -->
    <main class="container">
        <h1>Добро пожаловать в DarkGalaxy</h1>
        <p>Новая система меню и тем. Чисто, быстро, удобно.</p>
        <div style="margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
            <button class="btn">Основная кнопка</button>
            <button class="btn btn-secondary">Вторичная</button>
        </div>
    </main>

    <script>
// ========================================
// 🌟 COMMON.JS
// ========================================

const THEMES = [
    { id: '', name: 'Pink', gradient: 'linear-gradient(135deg, #ff9f1c, #d63384)', dot: '#d63384' },
    { id: 'theme-royal-blue', name: 'Royal Blue', gradient: 'linear-gradient(135deg, #3b82f6, #60a5fa)', dot: '#3b82f6' },
    { id: 'theme-deep-purple', name: 'Deep Purple', gradient: 'linear-gradient(135deg, #8b5cf6, #3b82f6)', dot: '#8b5cf6' },
    { id: 'theme-ghost', name: 'Ghost', gradient: 'linear-gradient(135deg, #80deea, #e0f7fa)', dot: '#e0f7fa' },
    { id: 'theme-neutral', name: 'Neutral', gradient: 'linear-gradient(135deg, #9ca3af, #d1d5db)', dot: '#9ca3af' },
    { id: 'theme-black-amber', name: 'Black Amber', gradient: 'linear-gradient(135deg, #ff5722, #ff9800)', dot: '#ff5722' }
];

// === COOKIES ===
function setCookie(name, value, days = 365) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
}

function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : null;
}

// === ПРИМЕНЕНИЕ ТЕМЫ ===
function applyTheme(themeId) {
    document.body.className = themeId;
    setCookie('site_theme', themeId);
    updateThemeUI(themeId);
}

function updateThemeUI(activeTheme) {
    document.querySelectorAll('.theme-option, .mobile-theme-card').forEach(el => {
        el.classList.toggle('active', el.dataset.theme === activeTheme);
    });
}

// === ГЕНЕРАЦИЯ ПК НАВБАРА ===
function buildDesktopNavbar() {
    // Проверяем, есть уже или нет
    if (document.querySelector('.navbar')) return;
    
    const nav = document.createElement('nav');
    nav.className = 'navbar';
    nav.innerHTML = `
        <a href="index.html" class="logo">
            <span class="logo-gradient">🌌 DarkGalaxy</span>
        </a>
        <div class="nav-right">
            <ul class="desktop-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="#">Варп</a></li>
                <li><a href="#">Гайды</a></li>
                <li><a href="#">Ивенты</a></li>
            </ul>
            <div class="theme-dropdown" id="theme-dropdown">
                <button class="theme-btn" onclick="toggleThemeDropdown(event)">
                    🎨 Темы ▾
                </button>
                <div class="theme-list" id="desktop-theme-list"></div>
            </div>
        </div>
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Меню">
            <span></span><span></span><span></span>
        </button>
    `;
    
    document.body.prepend(nav);
    renderDesktopThemes();
}

function toggleThemeDropdown(e) {
    e.stopPropagation();
    const dropdown = document.getElementById('theme-dropdown');
    dropdown.classList.toggle('open');
}

// Закрытие дропдауна при клике вне
document.addEventListener('click', () => {
    const dropdown = document.getElementById('theme-dropdown');
    if (dropdown) dropdown.classList.remove('open');
});

function renderDesktopThemes() {
    const container = document.getElementById('desktop-theme-list');
    if (!container) return;
    
    THEMES.forEach(theme => {
        const btn = document.createElement('button');
        btn.className = 'theme-option';
        btn.dataset.theme = theme.id;
        btn.innerHTML = `
            <div class="theme-dot" style="background: ${theme.dot}"></div>
            <span>${theme.name}</span>
        `;
        btn.onclick = (e) => {
            e.stopPropagation();
            applyTheme(theme.id);
            document.getElementById('theme-dropdown').classList.remove('open');
        };
        container.appendChild(btn);
    });
}

// === МОБИЛЬНОЕ МЕНЮ ===
function buildMobileMenu() {
    if (document.querySelector('.mobile-overlay')) return;
    
    const overlay = document.createElement('div');
    overlay.className = 'mobile-overlay';
    overlay.id = 'mobile-overlay';
    
    let themesHTML = '';
    THEMES.forEach(theme => {
        themesHTML += `
            <div class="mobile-theme-card" data-theme="${theme.id}">
                <div class="mobile-theme-preview" style="background: ${theme.gradient}"></div>
                <div class="mobile-theme-name">${theme.name}</div>
            </div>
        `;
    });
    
    overlay.innerHTML = `
        <nav class="mobile-navbar">
            <a href="index.html" class="mobile-logo">
                <span class="logo-gradient">🌌 DarkGalaxy</span>
            </a>
        </nav>
        <div class="mobile-nav-inner">
            <a href="index.html" class="mobile-link">🏠 Главная</a>
            <a href="#" class="mobile-link">🚀 Варп</a>
            <a href="#" class="mobile-link">📖 Гайды</a>
            <a href="#" class="mobile-link">🎉 Ивенты</a>
            
            <div class="mobile-themes-section">
                <div class="mobile-themes-title">🎨 Темы оформления</div>
                <div class="mobile-theme-grid">
                    ${themesHTML}
                </div>
            </div>
        </div>
    `;
    
    document.body.appendChild(overlay);
    setupMobileMenu();
}

function setupMobileMenu() {
    const toggle = document.getElementById('mobile-toggle');
    const overlay = document.getElementById('mobile-overlay');
    
    if (!toggle || !overlay) return;
    
    toggle.onclick = (e) => {
        e.stopPropagation();
        const isOpen = overlay.classList.contains('active');
        overlay.classList.toggle('active');
        toggle.classList.toggle('open');
        document.body.style.overflow = isOpen ? '' : 'hidden';
    };
    
    overlay.onclick = (e) => {
        if (e.target === overlay) {
            overlay.classList.remove('active');
            toggle.classList.remove('open');
            document.body.style.overflow = '';
        }
    };
    
    overlay.querySelectorAll('.mobile-theme-card').forEach(card => {
        let pressTimer;
        
        const startPreview = () => {
            applyTheme(card.dataset.theme);
        };
        
        card.addEventListener('mousedown', () => {
            pressTimer = setTimeout(startPreview, 300);
        });
        
        card.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(startPreview, 300);
            e.preventDefault();
        });
        
        const cancelPreview = () => {
            clearTimeout(pressTimer);
        };
        
        card.addEventListener('mouseup', cancelPreview);
        card.addEventListener('mouseleave', cancelPreview);
        card.addEventListener('touchend', cancelPreview);
        
        card.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            applyTheme(card.dataset.theme);
        };
    });
}

// === ОЧИСТКА МОБИЛЬНОГО МЕНЮ ===
function cleanupMobileMenu() {
    const overlay = document.querySelector('.mobile-overlay');
    const toggle = document.getElementById('mobile-toggle');
    
    if (overlay) overlay.remove();
    if (toggle) {
        toggle.classList.remove('open');
        toggle.style.display = '';
    }
    document.body.style.overflow = '';
}

// === ЗВЕЗДЫ ===
function createStars() {
    const container = document.getElementById('stars');
    if (!container || container.children.length > 0) return;
    
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        const size = Math.random() * 2 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.color = ['#fff', '#ffd166', '#00b4d8', '#d63384'][Math.floor(Math.random() * 4)];
        star.style.animationDelay = `${Math.random() * 3}s`;
        container.appendChild(star);
    }
}

// === ИНИЦИАЛИЗАЦИЯ ===
function init() {
    buildDesktopNavbar();
    createStars();
    
    const savedTheme = getCookie('site_theme');
    applyTheme(savedTheme || '');
    
    setupResponsiveMenu();
}

function setupResponsiveMenu() {
    const isMobile = window.innerWidth <= 768;
    
    if (isMobile) {
        buildMobileMenu();
        // Скрываем кнопку бургера если она есть в десктоп меню
        const desktopToggle = document.querySelector('.navbar .mobile-toggle');
        if (desktopToggle) desktopToggle.style.display = 'none';
    } else {
        cleanupMobileMenu();
        // Показываем кнопку бургера в десктоп меню
        const desktopToggle = document.querySelector('.navbar .mobile-toggle');
        if (desktopToggle) desktopToggle.style.display = 'flex';
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

window.addEventListener('resize', () => {
    clearTimeout(window.resizeTimer);
    window.resizeTimer = setTimeout(() => {
        setupResponsiveMenu();
    }, 150);
});
    </script>
</body>
</html>
