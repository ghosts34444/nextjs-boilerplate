<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление - DarkGalaxy Admin</title>
    <link rel="stylesheet" href="/admin/styles/console.css">
    <link rel="stylesheet" href="/admin/styles/management.css">
    <style>
        /* ========================================
АДМИН-ПАНЕЛЬ
======================================== */

.console-main {
    padding-top: 120px;
    min-height: 100vh;
}

.content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
}

.content h1 {
    margin-bottom: 30px;
    font-size: 2rem;
    background: linear-gradient(135deg, #e0e0ff, #8a6dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* === ВКЛАДКИ === */
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    border-bottom: 2px solid rgba(80, 80, 120, 0.3);
    padding-bottom: 10px;
}

.tab-btn {
    padding: 12px 24px;
    background: rgba(255, 255, 255, 0.05);
    border: none;
    border-radius: 10px 10px 0 0;
    color: #888;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.tab-btn:hover {
    background: rgba(138, 109, 255, 0.2);
    color: #e0e0ff;
}

.tab-btn.active {
    background: linear-gradient(135deg, #8a6dff, #6d4dff);
    color: white;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

/* === СЕКЦИИ === */
.section-box {
    background: rgba(30, 30, 50, 0.9);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(80, 80, 120, 0.3);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 30px;
}

.section-box h2 {
    margin-bottom: 20px;
    font-size: 1.5rem;
    color: #e0e0ff;
}

/* === ФИЛЬТРЫ === */
.admins-filter {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.search-input {
    flex: 1;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(80, 80, 120, 0.3);
    border-radius: 10px;
    color: #e0e0ff;
    font-size: 1rem;
    outline: none;
}

.filter-select {
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(80, 80, 120, 0.3);
    border-radius: 10px;
    color: #e0e0ff;
    font-size: 1rem;
    outline: none;
    min-width: 200px;
}

/* === СПИСОК АДМИНОВ === */
.admins-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 15px;
}

.admin-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(80, 80, 120, 0.3);
    border-radius: 12px;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: all 0.2s;
    cursor: pointer;
}

.admin-card:hover {
    background: rgba(138, 109, 255, 0.1);
    border-color: rgba(138, 109, 255, 0.5);
    transform: translateY(-2px);
}

.admin-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid rgba(138, 109, 255, 0.5);
    object-fit: cover;
}

.admin-info {
    flex: 1;
    min-width: 0;
}

.admin-username {
    display: block;
    color: #e0e0ff;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 4px;
}

.admin-details {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 0.85rem;
}

.admin-role {
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(138, 109, 255, 0.2);
    color: #8a6dff;
}

.admin-discord {
    color: #888;
}

.admin-status {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
}

.admin-status.active {
    background: rgba(46, 204, 113, 0.2);
    color: #2ecc71;
}

.admin-status.inactive {
    background: rgba(149, 165, 166, 0.2);
    color: #95a5a6;
}

/* === СПИСОК РОЛЕЙ === */
.roles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px;
}

.role-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(80, 80, 120, 0.3);
    border-radius: 12px;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
}

.role-card:hover {
    background: rgba(138, 109, 255, 0.1);
    border-color: rgba(138, 109, 255, 0.5);
}

.role-color {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.2);
    flex-shrink: 0;
}

.role-info {
    flex: 1;
}

.role-name {
    display: block;
    color: #e0e0ff;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 4px;
}

.role-display {
    display: block;
    color: #888;
    font-size: 0.85rem;
}

.role-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    margin-top: 4px;
}

.role-badge.system {
    background: rgba(255, 107, 107, 0.2);
    color: #ff6b6b;
}

.role-actions {
    display: flex;
    gap: 8px;
}

.role-actions button {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    transition: all 0.2s;
}

.role-actions button:hover {
    background: rgba(138, 109, 255, 0.2);
    color: #e0e0ff;
}

.role-actions button.delete:hover {
    background: rgba(255, 107, 107, 0.2);
    color: #ff6b6b;
}

/* === ФОРМЫ === */
.register-form,
.role-form {
    display: grid;
    gap: 20px;
}

.form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.form-group label {
    color: #888;
    font-size: 0.9rem;
    font-weight: 500;
}

.form-group input,
.form-group select {
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(80, 80, 120, 0.3);
    border-radius: 10px;
    color: #e0e0ff;
    font-size: 1rem;
    outline: none;
    transition: all 0.2s;
}

.form-group input:focus,
.form-group select:focus {
    border-color: #8a6dff;
    box-shadow: 0 0 0 3px rgba(138, 109, 255, 0.1);
}

.form-group select option {
    background: #1e1e32;
    color: #e0e0ff;
}

.form-group input[type="color"] {
    height: 50px;
    padding: 5px;
    cursor: pointer;
}

.password-input {
    display: flex;
    gap: 8px;
}

.password-input input {
    flex: 1;
}

.password-input .btn-icon {
    padding: 10px 14px;
    background: rgba(138, 109, 255, 0.2);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.password-input .btn-icon:hover {
    background: rgba(138, 109, 255, 0.4);
}

.form-hint {
    font-size: 0.85rem;
    color: #666;
    margin-top: 4px;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #e0e0ff;
    cursor: pointer;
}

.checkbox-label input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.permissions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
}

.permission-checkbox {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(80, 80, 120, 0.2);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    color: #e0e0ff;
    font-size: 0.9rem;
}

.permission-checkbox:hover {
    background: rgba(138, 109, 255, 0.1);
    border-color: rgba(138, 109, 255, 0.4);
}

.permission-checkbox input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.form-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

/* === КНОПКИ === */
.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-primary {
    background: linear-gradient(135deg, #8a6dff, #6d4dff);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(138, 109, 255, 0.4);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    color: #e0e0ff;
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.2);
}

.btn-danger {
    background: rgba(255, 107, 107, 0.2);
    color: #ff6b6b;
}

.btn-danger:hover {
    background: rgba(255, 107, 107, 0.3);
}

/* === МОДАЛКА === */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: rgba(30, 30, 50, 0.98);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(80, 80, 120, 0.3);
    border-radius: 16px;
    width: 90%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid rgba(80, 80, 120, 0.3);
}

.modal-header h2 {
    margin: 0;
    font-size: 1.5rem;
    color: #e0e0ff;
}

.modal-close {
    background: none;
    border: none;
    color: #888;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 5px;
    transition: color 0.2s;
}

.modal-close:hover {
    color: #ff6b6b;
}

.modal-body {
    padding: 20px;
    display: grid;
    gap: 20px;
}

.modal-footer {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    border-top: 1px solid rgba(80, 80, 120, 0.3);
}

/* === АДАПТИВ === */
@media (max-width: 768px) {
    .form-row {
        grid-template-columns: 1fr;
    }
    
    .admins-grid,
    .roles-grid {
        grid-template-columns: 1fr;
    }
    
    .admins-filter {
        flex-direction: column;
    }
    
    .filter-select {
        min-width: 100%;
    }
    
    .permissions-grid {
        grid-template-columns: 1fr;
    }
    
    .modal-content {
        width: 95%;
    }
    
    .modal-footer {
        flex-direction: column;
        gap: 10px;
    }
    
    .modal-footer .btn {
        width: 100%;
    }
    
    .tabs {
        flex-wrap: wrap;
    }
    
    .tab-btn {
        flex: 1;
        min-width: 120px;
    }
}

        /* === ЗАМОРОЖЕННЫЕ АККАУНТЫ === */
        .admin-card.frozen {
            border-color: #ff6b6b !important;
            background: rgba(255, 107, 107, 0.1) !important;
            position: relative;
            animation: frozenPulse 2s infinite;
        }
        .admin-card.frozen::before {
            content: "❄️ ЗАМОРОЖЕН";
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff6b6b;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            z-index: 1;
        }
        .admin-card.frozen .card-avatar {
            filter: grayscale(80%) brightness(0.7);
            border-color: #ff6b6b !important;
        }
        @keyframes frozenPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.2); }
            50% { box-shadow: 0 0 0 10px rgba(255, 107, 107, 0); }
        }
        .self-freeze-warning {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
            color: #ff6b6b;
            font-size: 13px;
        }
        .self-freeze-warning strong { color: #fff; }
        
        /* === ПРАВА ДОСТУПА === */
        .permissions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .permission-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .permission-checkbox:hover {
            background: rgba(138,109,255,0.1);
            border-color: var(--accent-alt);
        }
        .permission-checkbox input { cursor: pointer; }
        
        /* === СПИСОК РОЛЕЙ === */
        .role-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .role-card:hover { border-color: var(--accent-alt); transform: translateX(5px); }
        .role-info h3 { margin: 0 0 5px 0; }
        .role-info small { color: #888; }
        .perm-list { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
        .perm-tag {
            background: var(--accent-alt);
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <main style="padding-top: 90px;">
        <div class="content">
            <h1>⚙️ Панель управления</h1>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('register')">📝 Регистрация</div>
                <div class="tab" onclick="switchTab('manage')">👥 Управление админами</div>
                <div class="tab" onclick="switchTab('roles')">🏷️ Управление ролями</div>
            </div>

            <!-- Вкладка 1: Регистрация -->
            <div id="tab-register" class="tab-content active">
                <div class="register-form" style="max-width:500px;margin:0 auto;">
                    <h3 style="text-align:center;margin-bottom:20px;">Новый администратор</h3>
                    <div class="form-group">
                        <label>Логин *</label>
                        <input type="text" id="reg-username" placeholder="Минимум 3 символа">
                    </div>
                    <div class="form-group">
                        <label>Пароль *</label>
                        <input type="password" id="reg-password" placeholder="Минимум 6 символов">
                    </div>
                    <div class="form-group">
                        <label>LoliNick (опционально)</label>
                        <input type="text" id="reg-loli" placeholder="Ник в LoliLand">
                    </div>
                    <div class="form-group">
                        <label>Роль *</label>
                        <select id="reg-role"><option value="">Загрузка...</option></select>
                    </div>
                    <button class="btn" style="width:100%" onclick="registerAdmin()">Зарегистрировать</button>
                </div>
            </div>

            <!-- Вкладка 2: Управление админами -->
            <div id="tab-manage" class="tab-content">
                <div id="admin-grid" class="admin-grid"></div>
            </div>

            <!-- Вкладка 3: Управление ролями -->
            <div id="tab-roles" class="tab-content">
                <div style="margin-bottom:20px;">
                    <button class="btn" onclick="openRoleModal()">+ Создать роль</button>
                </div>
                <div id="role-list" class="role-list"></div>
            </div>
        </div>
    </main>

    <!-- Модальное окно редактирования админа -->
    <div class="modal" id="admin-modal">
        <div class="modal-box">
            <h3 id="admin-modal-title">Редактирование</h3>
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="edit-username" readonly>
            </div>
            <div class="form-group">
                <label>Пароль (оставьте пустым, чтобы не менять)</label>
                <input type="password" id="edit-password" placeholder="Новый пароль...">
            </div>
            <div class="form-group">
                <label>LoliNick</label>
                <input type="text" id="edit-loli">
            </div>
            <div class="form-group">
                <label>Роль</label>
                <select id="edit-role"></select>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('admin-modal')">Отмена</button>
                <button class="btn mods-btn" onclick="saveAdmin()">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно роли -->
    <div class="modal" id="role-modal">
        <div class="modal-box">
            <h3 id="role-modal-title">Создание роли</h3>
            <input type="hidden" id="edit-role-id">
            <div class="form-group">
                <label>Системное имя (латиница, не меняется) *</label>
                <input type="text" id="role-name" placeholder="например: moderator">
            </div>
            <div class="form-group">
                <label>Отображаемое имя</label>
                <input type="text" id="role-display" placeholder="например: Модератор">
            </div>
            <div class="form-group">
                <label>Цвет</label>
                <input type="color" id="role-color" value="#8a6dff">
            </div>
            <div class="form-group">
                <label>📄 Доступ к страницам</label>
                <small style="color:#888;display:block;margin-bottom:8px">
                    Отмеченная страница = полный доступ к ней
                </small>
                <div class="permissions-grid">
                    <label class="permission-checkbox"><input type="checkbox" name="perm" value="console"> 🏠 Консоль</label>
                    <label class="permission-checkbox"><input type="checkbox" name="perm" value="files"> 📁 Файлы</label>
                    <label class="permission-checkbox"><input type="checkbox" name="perm" value="admin"> ⚙️ Админы</label>
                    <label class="permission-checkbox"><input type="checkbox" name="perm" value="guides"> 📚 Гайды</label>
                    <label class="permission-checkbox"><input type="checkbox" name="perm" value="prices"> 💰 Цены</label>
                    <label class="permission-checkbox"><input type="checkbox" name="perm" value="events"> 🎉 Ивенты</label>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('role-modal')">Отмена</button>
                <button class="btn mods-btn" onclick="saveRole()">Сохранить</button>
                <button class="btn" style="background:#ff6b6b;border:none;color:white" onclick="deleteRoleFromModal()" id="role-delete-btn" style="display:none">🗑️ Удалить</button>
            </div>
        </div>
    </div>

    <!-- Контекстное меню -->
    <div id="context-menu">
        <button onclick="editFromMenu()">✏️ Редактировать</button>
        <button onclick="toggleFreezeFromMenu()">❄️ Заморозить/Разморозить</button>
        <button class="danger" onclick="deleteFromMenu()">🗑️ Удалить</button>
    </div>

    <script src="/admin/scripts/menu.js?v=4"></script>
    <script>
        let admins = [];
        let roles = [];
        let currentAdminId = null;
        let contextMenuTargetId = null;
        let currentUserId = null;

        // Переключение табов
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            if (tabName === 'manage') loadAdmins();
            if (tabName === 'roles') loadRoles();
        }

        // Инициализация
        async function init() {
            await loadCurrentUser();
            await loadRoles();
            loadAdmins();
        }

        // Загрузка текущего пользователя
        async function loadCurrentUser() {
            try {
                const res = await fetch('/api/auth/check', { credentials: 'include' });
                const data = await res.json();
                if (data.authenticated && data.user) {
                    currentUserId = data.user.id;
                }
            } catch(e) { console.error('❌ Ошибка:', e); }
        }

        // === АДМИНЫ ===
        async function loadAdmins() {
            const res = await fetch('/api/admins', { credentials: 'include' });
            admins = await res.json();
            renderAdmins();
        }

        function renderAdmins() {
            const grid = document.getElementById('admin-grid');
            grid.innerHTML = '';
            
            admins.forEach(admin => {
                const role = roles.find(r => r.id === admin.role_id) || { display_name: 'Нет', color: '#555' };
                const isFrozen = !admin.is_active;
                const isSelf = admin.id === currentUserId;
                
                const div = document.createElement('div');
                div.className = `admin-card ${isFrozen ? 'frozen' : ''}`;
                
                const avatarUrl = admin.loli_nick 
                    ? `https://loliland.ru/apiv2/user/avatar/medium/${admin.loli_nick}.webp`
                    : '/assets/default-avatar.png';
                
                const selfWarning = isSelf && isFrozen 
                    ? `<div class="self-freeze-warning"><strong>⚠️ Внимание!</strong> Вы заморозили свой аккаунт. Обратитесь к другому владельцу.</div>` 
                    : '';
                
                div.innerHTML = `
                    ${selfWarning}
                    <div class="card-header">
                        <img src="${avatarUrl}" class="card-avatar" onerror="this.src='/assets/default-avatar.png'">
                        <div class="card-info">
                            <h3>${admin.username} ${isSelf ? '<small style="color:#8a6dff">(Вы)</small>' : ''} ${isFrozen ? '<span class="frozen-badge">ЗАМОРОЖЕН</span>' : ''}</h3>
                            <p>Loli: ${admin.loli_nick || 'Не указан'}</p>
                            <span class="role-badge" style="background:${role.color}">${role.display_name}</span>
                        </div>
                    </div>
                `;
                
                div.onclick = (e) => { if (e.button !== 2) openEditModal(admin.id); };
                div.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(e, admin.id); };
                grid.appendChild(div);
            });
        }

        function openEditModal(id) {
            const admin = admins.find(a => a.id === id);
            document.getElementById('admin-modal-title').textContent = `Редактирование: ${admin.username}`;
            document.getElementById('edit-username').value = admin.username;
            document.getElementById('edit-password').value = '';
            document.getElementById('edit-loli').value = admin.loli_nick || '';
            updateRoleSelects();
            document.getElementById('edit-role').value = admin.role_id;
            document.getElementById('admin-modal').classList.add('active');
            currentAdminId = id;
        }

        async function saveAdmin() {
            const data = {
                username: document.getElementById('edit-username').value,
                loli_nick: document.getElementById('edit-loli').value,
                role_id: document.getElementById('edit-role').value,
                password: document.getElementById('edit-password').value
            };
            const res = await fetch(`/api/admins/${currentAdminId}`, { 
                method: 'PATCH', headers: {'Content-Type':'application/json'}, 
                credentials: 'include', body: JSON.stringify(data) 
            });
            if (res.ok) { closeModal('admin-modal'); loadAdmins(); }
            else { const err = await res.json(); alert('❌ ' + err.error); }
        }

        async function registerAdmin() {
            const data = {
                username: document.getElementById('reg-username').value,
                password: document.getElementById('reg-password').value,
                loli_nick: document.getElementById('reg-loli').value,
                role_id: document.getElementById('reg-role').value
            };
            if (!data.username || !data.password || !data.role_id) return alert('Заполните все обязательные поля');
            const res = await fetch('/api/admins', { 
                method: 'POST', headers: {'Content-Type':'application/json'}, 
                credentials: 'include', body: JSON.stringify(data) 
            });
            if (res.ok) {
                alert('✅ Админ создан!');
                document.getElementById('reg-username').value = '';
                document.getElementById('reg-password').value = '';
                document.getElementById('reg-loli').value = '';
                loadAdmins();
            } else { const err = await res.json(); alert('❌ ' + err.error); }
        }

        // === РОЛИ ===
        async function loadRoles() {
            const res = await fetch('/api/roles', { credentials: 'include' });
            roles = await res.json();
            renderRoles();
            updateRoleSelects();
        }

        function renderRoles() {
            const list = document.getElementById('role-list');
            list.innerHTML = '';
            roles.forEach(role => {
                const perms = JSON.parse(role.permissions || '{}');
                const permTags = Object.keys(perms).filter(k => perms[k]).map(k => 
                    `<span class="perm-tag">${k}</span>`).join('') || '<span class="perm-tag" style="background:#333">Нет прав</span>';
                
                const div = document.createElement('div');
                div.className = 'role-card';
                div.innerHTML = `
                    <div class="role-info">
                        <h3 style="color:${role.color||'#fff'}">${role.display_name}</h3>
                        <small>${role.name} ${role.is_system?'<span style="color:#888">(Системная)</span>':''}</small>
                        <div class="perm-list">${permTags}</div>
                    </div>
                    <div>
                        ${!role.is_system ? `<button class="btn mods-btn" onclick="openEditRole('${role.id}')">✏️</button>` : ''}
                        ${!role.is_system ? `<button class="btn" style="background:#ff6b6b;border:none;color:white" onclick="deleteRole('${role.id}')">🗑️</button>` : ''}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function updateRoleSelects() {
            const opts = roles.map(r => `<option value="${r.id}">${r.display_name}</option>`).join('');
            ['reg-role','edit-role'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = opts;
            });
        }

        function openRoleModal() {
            document.getElementById('role-modal-title').textContent = 'Создание роли';
            document.getElementById('edit-role-id').value = '';
            document.getElementById('role-name').value = '';
            document.getElementById('role-name').disabled = false;
            document.getElementById('role-display').value = '';
            document.getElementById('role-color').value = '#8a6dff';
            document.querySelectorAll('input[name="perm"]').forEach(cb => cb.checked = false);
            document.getElementById('role-delete-btn').style.display = 'none';
            document.getElementById('role-modal').classList.add('active');
        }

        function openEditRole(id) {
            const role = roles.find(r => r.id === id);
            if (!role || role.is_system) return alert('Системные роли нельзя редактировать');
            
            document.getElementById('role-modal-title').textContent = 'Редактирование роли';
            document.getElementById('edit-role-id').value = role.id;
            document.getElementById('role-name').value = role.name;
            document.getElementById('role-name').disabled = true;
            document.getElementById('role-display').value = role.display_name || '';
            document.getElementById('role-color').value = role.color || '#8a6dff';
            
            const perms = JSON.parse(role.permissions || '{}');
            document.querySelectorAll('input[name="perm"]').forEach(cb => {
                cb.checked = !!perms[cb.value];
            });
            
            document.getElementById('role-delete-btn').style.display = 'inline-block';
            document.getElementById('role-modal').classList.add('active');
        }

        function collectPermissions() {
            const perms = {};
            document.querySelectorAll('input[name="perm"]:checked').forEach(cb => { perms[cb.value] = true; });
            return perms;
        }

        async function saveRole() {
            const roleId = document.getElementById('edit-role-id').value;
            const data = {
                name: document.getElementById('role-name').value,
                display_name: document.getElementById('role-display').value,
                color: document.getElementById('role-color').value,
                permissions: collectPermissions()
            };
            if (!data.name) return alert('Системное имя обязательно');
            
            const url = roleId ? `/api/roles/${roleId}` : '/api/roles';
            const method = roleId ? 'PATCH' : 'POST';
            
            const res = await fetch(url, { 
                method, headers: {'Content-Type':'application/json'}, 
                credentials: 'include', body: JSON.stringify(data) 
            });
            if (res.ok) { closeModal('role-modal'); loadRoles(); }
            else { const err = await res.json(); alert('❌ ' + err.error); }
        }

        async function deleteRole(id) {
            if (!confirm('Удалить роль? У админов с этой ролью права сбросятся.')) return;
            await fetch(`/api/roles/${id}`, { method: 'DELETE', credentials: 'include' });
            loadRoles();
        }

        async function deleteRoleFromModal() {
            const id = document.getElementById('edit-role-id').value;
            if (id && confirm('Удалить эту роль?')) {
                await fetch(`/api/roles/${id}`, { method: 'DELETE', credentials: 'include' });
                closeModal('role-modal');
                loadRoles();
            }
        }

        // === КОНТЕКСТНОЕ МЕНЮ ===
        function showContextMenu(e, id) {
            contextMenuTargetId = id;
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }
        document.addEventListener('click', () => document.getElementById('context-menu').style.display = 'none');
        function editFromMenu() { openEditModal(contextMenuTargetId); }
        
        async function deleteFromMenu() {
            if (confirm('Удалить администратора?')) {
                await fetch(`/api/admins/${contextMenuTargetId}`, { method: 'DELETE', credentials: 'include' });
                loadAdmins();
            }
        }

        async function toggleFreezeFromMenu() {
            const admin = admins.find(a => a.id === contextMenuTargetId);
            if (admin.id === currentUserId && admin.is_active) {
                if (!confirm('⚠️ Вы собираетесь заморозить СВОЙ аккаунт! Вы не сможете войти, пока другой владелец не разморозит вас. Продолжить?')) {
                    return;
                }
            }
            await fetch(`/api/admins/${admin.id}`, { 
                method: 'PATCH', headers: {'Content-Type':'application/json'}, 
                credentials: 'include', body: JSON.stringify({ is_active: admin.is_active ? 0 : 1 }) 
            });
            loadAdmins();
        }

        // === УТИЛИТЫ ===
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        window.onclick = e => { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); };

        init();
    </script>
</body>
</html>
