<!-- Модальное окно смены пароля -->
<div class="modal-overlay" id="password-modal">
    <div class="modal-box">
        <h3>🔑 Смена пароля</h3>
        <div class="form-group">
            <label>Старый пароль</label>
            <input type="password" id="old-password" placeholder="Введите старый пароль">
        </div>
        <div class="form-group">
            <label>Новый пароль</label>
            <input type="password" id="new-password" placeholder="Введите новый пароль">
        </div>
        <div class="form-group">
            <label>Подтвердите пароль</label>
            <input type="password" id="confirm-password" placeholder="Повторите новый пароль">
        </div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closePasswordModal()">Отмена</button>
            <button class="modal-btn save" onclick="changePassword()">Сохранить</button>
        </div>
    </div>
</div>
